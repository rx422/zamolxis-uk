<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zamolxis — Personal homelab dashboard">
  <meta name="theme-color" content="#0c0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Zamolxis — Homelab</title>

  <!-- Favicons and Touch Icons -->
  <link rel="icon" href="logo/favicon.ico" sizes="16x16 32x32 48x48 64x64" type="image/x-icon">
  <link rel="icon" href="logo/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="logo/apple-touch-icon.png" sizes="180x180">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <h1 class="header__title">zamolxis<span class="header__tld">.uk</span></h1>
        <p class="header__subtitle">Personal homelab dashboard</p>
      </div>
      <div class="header__controls">
        <div class="mode-switch" role="tablist" aria-label="Network mode">
          <button class="mode-switch__btn" id="btn-local" role="tab" aria-selected="true" data-mode="local">
            <svg class="mode-switch__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="7" cy="6" r="1"/><circle cx="7" cy="18" r="1"/></svg>
            Local
          </button>
          <button class="mode-switch__btn" id="btn-tailscale" role="tab" aria-selected="false" data-mode="tailscale">
            <svg class="mode-switch__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Tailscale
          </button>
        </div>
      </div>
    </header>

    <!-- Search -->
    <div class="search">
      <input class="search__input" id="search-input" type="text" placeholder="Filter services… ( / )" autocomplete="off" spellcheck="false">
      <svg class="search__icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
    </div>

    <!-- Services -->
    <main class="main" id="services-container">
      <!-- Rendered by app.js -->
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>Adrian Birnaz</span>
      <span class="footer__dot" aria-hidden="true">·</span>
      <span>Private infrastructure</span>
    </footer>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
